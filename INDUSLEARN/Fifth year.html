    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
        }
        body {
            direction: rtl;
            background: linear-gradient(135deg, #08507a 0%, #222b61 50%, #094f6a 100%);
            margin: 0;
            padding: 0;
            min-height: 100vh;
        }

        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: linear-gradient(90deg, #0b6192, #222b61);
            padding: 15px 30px;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 1000;
            box-shadow: 0 3px 8px rgba(0, 0, 0, 0.2);
        }

        .navbar img {
            max-height: 60px;
            width: auto;
        }

        .navbar-links {
            display: flex;
            gap: 15px;
            direction: ltr;
            flex-direction: row-reverse;
        }

        .navbar-links a {
            color: white;
            text-decoration: none;
            font-size: 16px;
            padding: 8px 15px;
            border-radius: 8px;
            transition: background-color 0.4s ease;
        }

        .navbar-links a:hover {
            background-color: rgba(255, 255, 255, 0.3);
        }

        .hamburger {
            display: none;
            flex-direction: column;
            gap: 6px;
            cursor: pointer;
            padding: 12px;
        }

        .hamburger div {
            width: 28px;
            height: 3px;
            background-color: white;
        }

        .menu {
            display: none;
            position: absolute;
            top: 70px;
            right: 10px;
            width: 200px;
            background: #004e64;
            padding: 10px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
            z-index: 1000;
            border-radius: 8px;
            animation: slideIn 0.4s ease forwards;
        }

        .menu a {
            display: block;
            padding: 8px;
            color: white;
            text-decoration: none;
            text-align: right;
            font-size: 14px;
            transition: background-color 0.4s ease;
        }

        .menu a:hover {
            background-color: rgba(255, 255, 255, 0.3);
        }

        .menu.active {
            display: block;
        }

        @keyframes slideIn {
            from {
                transform: translateY(-20px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        @media (max-width: 768px) {
            .navbar-links {
                display: none;
            }
            .hamburger {
                display: flex;
            }
            .navbar img {
                order: 2; /* اللوجو يظهر على اليمين في الشاشات الصغيرة */
            }
            .hamburger {
                order: 1; /* زر القائمة المنسدلة يظهر على اليسار في الشاشات الصغيرة */
            }
        }

        .container {
            width: 80%;
            margin: 100px auto 0;
            padding: 20px;
        }

        .course-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        .course-card {
            background-color: rgba(255, 255, 255, 0.85);
            border-radius: 10px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            backdrop-filter: blur(12px);
        }

        .course-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2);
        }

        .course-card h3 {
            color: #004e64;
            font-size: 20px;
            margin-bottom: 15px;
        }

        .course-card a {
            display: inline-block;
            padding: 10px 20px;
            background-color: #004e64;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            transition: background-color 0.3s ease;
        }

        .course-card a:hover {
            background-color: #08507a;
        }

        @media (max-width: 768px) {
            .container {
                width: 90%;
            }

            .course-grid {
                grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            }
        }
    </style>
</head>
